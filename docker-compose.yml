version: '3.8'

services:
  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "next", "start", "-p", "3000", "-H", "0.0.0.0"]
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://sovereign:whale@postgres:5432/ominverse?schema=public
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SovereignLevel9
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - neo4j
      - redis
    networks:
      - sovereign-net

  # PostgreSQL + pgvector
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: whale
      POSTGRES_DB: ominverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sovereign-net

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.11
    environment:
      NEO4J_AUTH: neo4j/SovereignLevel9
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - sovereign-net

  # Redis for BullMQ & WebSockets
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sovereign-net

  # Sovereign Mesh Core (ZKP, AVS)
  worker-mesh:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "tsx", "scripts/sovereign-mesh.ts"]
    environment:
      - DATABASE_URL=postgresql://sovereign:whale@postgres:5432/ominverse?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net

  # Solana Block Scanner Worker
  worker-solana:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "tsx", "scripts/solana-worker.ts"]
    environment:
      - DATABASE_URL=postgresql://sovereign:whale@postgres:5432/ominverse?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net

networks:
  sovereign-net:

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
